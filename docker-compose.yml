services:
  frontend:
    build: ./frontend
    container_name: integrity_frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:4000
    depends_on:
      - backend
    networks:
      - integrity_net

  backend:
    build: ./backend
    container_name: integrity_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASS}@postgres:5432/${POSTGRES_DB}?schema=public
      - REDIS_URL=redis://redis:6379
      - GARAGE_ENDPOINT=http://garage:3900
      - GARAGE_REGION=garage
      - GARAGE_ACCESS_KEY=${GARAGE_ACCESS_KEY}
      - GARAGE_SECRET_KEY=${GARAGE_SECRET_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - APP_URL=${APP_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN}
      - WHATSAPP_PHONE_ID=${WHATSAPP_PHONE_ID}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      garage:
        condition: service_healthy
    networks:
      - integrity_net

  postgres:
    image: postgres:16-alpine
    container_name: integrity_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASS}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - integrity_net

  redis:
    image: redis:7-alpine
    container_name: integrity_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - integrity_net

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: integrity_garage
    restart: unless-stopped
    volumes:
      - ./garage/garage.toml:/etc/garage.toml
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
    ports:
      - "127.0.0.1:3900:3900"   # S3 API (interno — bind apenas em localhost)
      - "127.0.0.1:3903:3903"   # Admin API (interno — bind apenas em localhost)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3903/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - integrity_net

  garage-webui:
    image: khairul169/garage-webui:latest
    container_name: integrity_garage_webui
    restart: unless-stopped
    environment:
      - API_BASE_URL=http://garage:3903
      - S3_REGION=garage
      - S3_ENDPOINT_URL=http://garage:3900
    depends_on:
      - garage
    networks:
      - integrity_net

  nginx:
    image: nginx:alpine
    container_name: integrity_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - integrity_net

volumes:
  postgres_data:
  redis_data:
  garage_meta:
  garage_data:
  certbot_certs:
  certbot_www:
  backups:

networks:
  integrity_net:
    driver: bridge
